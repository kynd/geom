<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rim Light</title>
  <script type="importmap">
  {"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.169.0/build/three.module.min.js"}}
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400&family=Google+Sans+Code:wght@400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../../styles/demo-ui.css" />
  <style>
    html, body { display: flex; align-items: center; justify-content: center; overflow: hidden; }
    #canvas { display: block; width: 1920px; height: 1080px; }

    #src-btns {
      position: absolute; bottom: 52px; left: 50%;
      transform: translateX(-50%);
      display: flex; gap: 8px;
      pointer-events: all;
    }
    #params {
      position: absolute; right: 56px; bottom: 110px;
      display: flex; flex-direction: column; gap: 7px;
      pointer-events: all;
    }
    .param-row { display: flex; align-items: center; gap: 10px; }
    .param-label {
      font-family: 'Sora', sans-serif; font-size: 11px; font-weight: 300;
      letter-spacing: 0.04em; color: rgba(255,255,255,0.35);
      width: 70px; text-align: right;
    }
    .param-slider {
      -webkit-appearance: none; appearance: none;
      width: 100px; height: 2px;
      background: rgba(255,255,255,0.16);
      border-radius: 1px; outline: none; cursor: pointer;
    }
    .param-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 10px; height: 10px; border-radius: 50%;
      background: rgba(255,255,255,0.65); cursor: pointer;
    }
    .param-slider::-moz-range-thumb {
      width: 10px; height: 10px; border-radius: 50%; border: none;
      background: rgba(255,255,255,0.65); cursor: pointer;
    }
    .param-val {
      font-family: 'Google Sans Code', monospace; font-size: 10px;
      color: rgba(255,255,255,0.35); width: 36px;
    }
  </style>
</head>
<body>
  <div class="canvas-wrap">
    <canvas id="canvas" width="1920" height="1080"></canvas>
    <div id="overlay">
      <div id="label" class="shape-label">
        <div id="shape-name" class="shape-label-name"></div>
      </div>
      <div id="params">
        <div class="param-row">
          <span class="param-label">rim</span>
          <input class="param-slider" type="range" id="sl-rim" min="1" max="6" step="0.1" value="3">
          <span class="param-val" id="vl-rim">3.0</span>
        </div>
        <div class="param-row">
          <span class="param-label">face</span>
          <input class="param-slider" type="range" id="sl-base" min="0" max="0.05" step="0.001" value="0">
          <span class="param-val" id="vl-base">0.000</span>
        </div>
        <div class="param-row">
          <span class="param-label">SSS str</span>
          <input class="param-slider" type="range" id="sl-sstr" min="0" max="1.5" step="0.01" value="0.3">
          <span class="param-val" id="vl-sstr">0.30</span>
        </div>
        <div class="param-row">
          <span class="param-label">SSS density</span>
          <input class="param-slider" type="range" id="sl-sdens" min="0.5" max="8" step="0.1" value="2.5">
          <span class="param-val" id="vl-sdens">2.5</span>
        </div>
      </div>
      <div id="src-btns">
        <button class="tab-btn"        data-src="0">SDF shapes</button>
        <button class="tab-btn"        data-src="1">Platonic duals</button>
        <button class="tab-btn"        data-src="2">Scalar fields</button>
        <button class="tab-btn active" data-src="3">Moving scalar</button>
      </div>
    </div>
    <div id="ctrl-bar" class="ctrl-bar">
      <div class="ctrl-bar-r1">
        <div class="ctrl-bar-spacer"></div>
        <button id="aa-btn" class="bar-btn" aria-label="Antialiasing off">Antialias</button>
        <button id="play-btn" class="play-btn" aria-label="Pause"></button>
      </div>
      <div class="ctrl-bar-r2">
        <span class="fps-inline" id="fps-meter">-- fps</span>
      </div>
    </div>
  </div>
  <script>
    if (new URLSearchParams(location.search).has('embedded')) {
      const canvas = document.getElementById('canvas');
      const wrap   = canvas.closest('.canvas-wrap');
      canvas.width  = 960; canvas.height  = 540;
      canvas.style.width  = '960px'; canvas.style.height = '540px';
      wrap.style.width    = '960px'; wrap.style.height   = '540px';
    }
  </script>
  <script type="module" src="./main.js"></script>
  <script>
(function(){var el=document.getElementById('fps-meter'),f=0,l=performance.now();function t(n){f++;if(n-l>=1000){el.textContent=f+' fps';f=0;l=n;}requestAnimationFrame(t);}requestAnimationFrame(t);})();
  </script>
</body>
</html>
