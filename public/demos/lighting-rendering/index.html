<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rim Light</title>
  <script type="importmap">
  {"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.169.0/build/three.module.min.js"}}
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400&family=Google+Sans+Code:wght@400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%; height: 100%;
      background: #000;
      display: flex; align-items: center; justify-content: center;
      overflow: hidden;
    }
    .canvas-wrap { position: relative; width: 1920px; height: 1080px; flex-shrink: 0; }
    #canvas { display: block; width: 1920px; height: 1080px; }
    #overlay {
      position: absolute; inset: 0;
      pointer-events: none; user-select: none;
    }
    #label {
      position: absolute;
      bottom: 56px; left: 56px;
    }
    #shape-name {
      font-family: 'Sora', sans-serif; font-size: 12px; font-weight: 400;
      color: rgba(255,255,255,0.55); letter-spacing: 0.04em;
      line-height: 1; white-space: nowrap;
    }
    #src-btns {
      position: absolute;
      bottom: 52px; left: 50%;
      transform: translateX(-50%);
      display: flex; gap: 8px;
      pointer-events: all;
    }
    .src-btn {
      font-family: 'Sora', sans-serif; font-size: 11px; font-weight: 300;
      letter-spacing: 0.06em;
      color: rgba(255,255,255,0.35);
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.14);
      border-radius: 20px;
      padding: 5px 18px;
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
    }
    .src-btn.active {
      color: rgba(255,255,255,0.90);
      background: rgba(255,255,255,0.16);
      border-color: rgba(255,255,255,0.38);
    }
    .src-btn:hover:not(.active) {
      color: rgba(255,255,255,0.60);
      background: rgba(255,255,255,0.10);
    }
    #play-btn {
      position: absolute; top: 32px; right: 32px;
      width: 48px; height: 48px; border-radius: 50%;
      background: rgba(255,255,255,0.14);
      border: 1px solid rgba(255,255,255,0.26);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      color: #ffffff; transition: background 0.15s; z-index: 10;
    }
    #play-btn:hover { background: rgba(255,255,255,0.26); }
    #aa-btn {
      position: absolute; top: 32px; right: 96px;
      height: 48px; padding: 0 14px; border-radius: 24px;
      background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.16);
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      font-family: 'Sora', sans-serif; font-size: 11px; font-weight: 300;
      color: rgba(255,255,255,0.30);
      transition: all 0.15s; z-index: 10;
    }
    #aa-btn.active { background: rgba(255,255,255,0.18); border-color: rgba(255,255,255,0.38); color: rgba(255,255,255,0.90); }
    #aa-btn:hover:not(.active) { background: rgba(255,255,255,0.14); color: rgba(255,255,255,0.55); }

    #params {
      position: absolute;
      right: 56px; bottom: 52px;
      display: flex; flex-direction: column; gap: 7px;
      pointer-events: all;
    }
    .param-row {
      display: flex; align-items: center; gap: 10px;
    }
    .param-label {
      font-family: 'Sora', sans-serif; font-size: 11px; font-weight: 300;
      letter-spacing: 0.04em;
      color: rgba(255,255,255,0.35);
      width: 70px; text-align: right;
    }
    .param-slider {
      -webkit-appearance: none; appearance: none;
      width: 100px; height: 2px;
      background: rgba(255,255,255,0.18);
      border-radius: 1px; outline: none; cursor: pointer;
    }
    .param-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 10px; height: 10px; border-radius: 50%;
      background: rgba(255,255,255,0.75); cursor: pointer;
    }
    .param-slider::-moz-range-thumb {
      width: 10px; height: 10px; border-radius: 50%; border: none;
      background: rgba(255,255,255,0.75); cursor: pointer;
    }
    .param-val {
      font-family: 'Google Sans Code', monospace; font-size: 10px;
      color: rgba(255,255,255,0.35); width: 36px;
    }
  </style>
</head>
<body>
  <div class="canvas-wrap">
    <canvas id="canvas" width="1920" height="1080"></canvas>
    <div id="overlay">
      <div id="label">
        <div id="shape-name"></div>
      </div>
      <div id="params">
        <div class="param-row">
          <span class="param-label">rim</span>
          <input class="param-slider" type="range" id="sl-rim" min="1" max="6" step="0.1" value="3">
          <span class="param-val" id="vl-rim">3.0</span>
        </div>
        <div class="param-row">
          <span class="param-label">face</span>
          <input class="param-slider" type="range" id="sl-base" min="0" max="0.05" step="0.001" value="0">
          <span class="param-val" id="vl-base">0.000</span>
        </div>
        <div class="param-row">
          <span class="param-label">SSS str</span>
          <input class="param-slider" type="range" id="sl-sstr" min="0" max="1.5" step="0.01" value="0.3">
          <span class="param-val" id="vl-sstr">0.30</span>
        </div>
        <div class="param-row">
          <span class="param-label">SSS density</span>
          <input class="param-slider" type="range" id="sl-sdens" min="0.5" max="8" step="0.1" value="2.5">
          <span class="param-val" id="vl-sdens">2.5</span>
        </div>
      </div>
      <div id="src-btns">
        <button class="src-btn active" data-src="0">SDF shapes</button>
        <button class="src-btn"        data-src="1">Scalar fields</button>
        <button class="src-btn"        data-src="2">Platonic duals</button>
      </div>
    </div>
    <button id="aa-btn" class="active" aria-label="Antialiasing on">Antialias ON</button>
    <button id="play-btn" aria-label="Pause"></button>
  </div>
  <script>
    if (new URLSearchParams(location.search).has('embedded')) {
      const canvas = document.getElementById('canvas');
      const wrap   = canvas.closest('.canvas-wrap');
      canvas.width  = 960; canvas.height  = 540;
      canvas.style.width  = '960px'; canvas.style.height = '540px';
      wrap.style.width    = '960px'; wrap.style.height   = '540px';
    }
  </script>
  <script type="module" src="./main.js"></script>
</body>
</html>
