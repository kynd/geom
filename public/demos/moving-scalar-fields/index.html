<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Moving Scalar Fields</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400&family=Google+Sans+Code:wght@400&display=swap" rel="stylesheet" />
  <script type="importmap">{"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.169.0/build/three.module.min.js"}}</script>
  <link rel="stylesheet" href="../../styles/demo-ui.css" />
  <style>
    html, body { display: flex; align-items: center; justify-content: center; overflow: hidden; }
    #canvas { display: block; width: 1920px; height: 1080px; }

  </style>
</head>
<body>
  <div class="canvas-wrap">
    <canvas id="canvas" width="1920" height="1080"></canvas>
    <div id="ctrl-bar" class="ctrl-bar">
      <div class="ctrl-bar-r1">
        <select id="shape-select" class="bar-select">
          <option value="0">cycle all</option>
          <option value="1">1. Traveling radial damped cosine</option>
          <option value="2">2. Pulsing torus</option>
          <option value="3">3. Traveling sinusoidal surface</option>
          <option value="4">4. Oscillating spheroid</option>
          <option value="5">5. Pulsing saddle</option>
          <option value="6">6. Pulsing gyroid</option>
          <option value="7">7. Oscillating Schwartz P</option>
          <option value="8">8. Pulsing lemniscate</option>
          <option value="9">9. Tilting ellipsoid</option>
          <option value="10">10. Pulsing tanglecube</option>
          <option value="11">11. Pulsing Chmutov T₄</option>
          <option value="12">12. Traveling sinusoidal cone</option>
          <option value="13">13. Pulsing Gaussian</option>
          <option value="14">14. Oscillating Schoen I-WP</option>
          <option value="15">15. Tilting saddle</option>
          <option value="16">16. Rotating torus</option>
          <option value="17">17. Rotating harmonic sphere</option>
          <option value="18">18. Traveling hyperboloid</option>
          <option value="19">19. Pulsing cyclic cubic</option>
          <option value="20">20. Rotating paraboloid</option>
        </select>
        <div class="ctrl-bar-spacer"></div>
        <button id="aa-btn" class="bar-btn" aria-label="Antialiasing off">Antialias</button>
        <button id="play-btn" class="play-btn" aria-label="Play"></button>
      </div>
      <div class="ctrl-bar-r2">
        <span class="fps-inline" id="fps-meter">-- fps</span>
      </div>
    </div>
    <div id="overlay">
      <div id="label" class="shape-label">
        <div id="shape-name" class="shape-label-name"></div>
        <div id="shape-func" class="shape-label-fn"></div>
      </div>
    </div>
  </div>
  <script>
    if (new URLSearchParams(location.search).has('embedded')) {
      const canvas = document.getElementById('canvas');
      const wrap   = canvas.closest('.canvas-wrap');
      canvas.width  = 960; canvas.height  = 540;
      canvas.style.width  = '960px'; canvas.style.height = '540px';
      wrap.style.width    = '960px'; wrap.style.height   = '540px';
    }
  </script>
  <script type="module" src="./main.js"></script>
  <script>
(function(){var el=document.getElementById('fps-meter'),f=0,l=performance.now();function t(n){f++;if(n-l>=1000){el.textContent=f+' fps';f=0;l=n;}requestAnimationFrame(t);}requestAnimationFrame(t);})();
  </script>
</body>
</html>
