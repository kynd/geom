<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Platonic Duals</title>
  <script type="importmap">
  {"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.169.0/build/three.module.min.js"}}
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; background: #000; display: flex; align-items: center; justify-content: center; overflow: hidden; }
    .canvas-wrap { position: relative; width: 1920px; height: 1080px; flex-shrink: 0; }
    #canvas { display: block; width: 1920px; height: 1080px; }
    #overlay { position: absolute; inset: 0; pointer-events: none; user-select: none; }
    .vp-label {
      position: absolute; bottom: 4.5%;
      font-family: 'Sora', sans-serif; font-size: 12px; font-weight: 300;
      color: rgba(255,255,255,0.38);
      white-space: nowrap;
      transform: translateX(-50%);
      letter-spacing: 0.07em;
    }
    #lbl-0 { left: 16.67%; }
    #lbl-1 { left: 50%; }
    #lbl-2 { left: 83.33%; }
    #play-btn {
      position: absolute;
      top: 32px; right: 32px;
      width: 48px; height: 48px;
      border-radius: 50%;
      background: rgba(255,255,255,0.14);
      border: 1px solid rgba(255,255,255,0.26);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      color: #ffffff;
      transition: background 0.15s;
      z-index: 10;
    }
    #play-btn:hover { background: rgba(255,255,255,0.26); }
    #aa-btn {
      position: absolute; top: 32px; right: 96px;
      height: 48px; padding: 0 14px; border-radius: 24px;
      background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.16);
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      font-family: 'Sora', sans-serif; font-size: 11px; font-weight: 300;
      color: rgba(255,255,255,0.30);
      transition: all 0.15s; z-index: 10;
    }
    #aa-btn.active { background: rgba(255,255,255,0.18); border-color: rgba(255,255,255,0.38); color: rgba(255,255,255,0.90); }
    #aa-btn:hover:not(.active) { background: rgba(255,255,255,0.14); color: rgba(255,255,255,0.55); }
  </style>
</head>
<body>
  <div class="canvas-wrap">
    <canvas id="canvas" width="1920" height="1080"></canvas>
    <div id="overlay">
      <span class="vp-label" id="lbl-0">Cube &thinsp;/&thinsp; Octahedron</span>
      <span class="vp-label" id="lbl-1">Tetrahedron &thinsp;/&thinsp; Tetrahedron</span>
      <span class="vp-label" id="lbl-2">Dodecahedron &thinsp;/&thinsp; Icosahedron</span>
    </div>
    <button id="aa-btn" class="active" aria-label="Antialiasing on">Antialias ON</button>
    <button id="play-btn" aria-label="Pause"></button>
  </div>
  <script>
    if (new URLSearchParams(location.search).has('embedded')) {
      const canvas = document.getElementById('canvas');
      const wrap   = canvas.closest('.canvas-wrap');
      canvas.width  = 960; canvas.height  = 540;
      canvas.style.width  = '960px'; canvas.style.height = '540px';
      wrap.style.width    = '960px'; wrap.style.height   = '540px';
    }
  </script>
  <script type="module" src="./main.js"></script>
</body>
</html>
