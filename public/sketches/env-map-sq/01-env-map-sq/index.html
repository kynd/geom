<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Env Map (Square)</title>
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.169.0/build/three.module.min.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.169.0/examples/jsm/"
    }
  }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400&family=Google+Sans+Code:wght@400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../../../styles/demo-ui.css" />
  <style>
    html, body { width: 100%; height: 100%; background: #000; display: flex; align-items: center; justify-content: center; overflow: hidden; }
    .canvas-wrap { position: relative; width: 1080px; height: 1080px; flex-shrink: 0; }
    #canvas { display: block; width: 1080px; height: 1080px; }
    #src-btns {
      position: absolute;
      bottom: 52px; left: 50%;
      transform: translateX(-50%);
      display: flex; gap: 8px;
      pointer-events: all;
    }
    .src-btn {
      font-family: 'Sora', sans-serif; font-size: 11px; font-weight: 300;
      letter-spacing: 0.06em;
      color: rgba(255,255,255,0.35);
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.14);
      border-radius: 20px;
      padding: 5px 18px;
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
    }
    .src-btn.active {
      color: rgba(255,255,255,0.90);
      background: rgba(255,255,255,0.16);
      border-color: rgba(255,255,255,0.38);
    }
    .src-btn:hover:not(.active) {
      color: rgba(255,255,255,0.60);
      background: rgba(255,255,255,0.10);
    }
    #shape-label {
      position: absolute; left: 56px; bottom: 96px;
      font-family: 'Sora', sans-serif; font-size: 12px; font-weight: 300;
      color: rgba(255,255,255,0.55); letter-spacing: 0.08em;
      text-transform: lowercase;
    }
  </style>
</head>
<body>
  <div class="canvas-wrap">
    <canvas id="canvas" width="1080" height="1080"></canvas>
    <div id="overlay">
      <div id="src-btns">
        <button class="src-btn"        data-src="0">SDF shapes</button>
        <button class="src-btn"        data-src="1">Platonic duals</button>
        <button class="src-btn"        data-src="2">Scalar fields</button>
        <button class="src-btn active" data-src="3">Moving scalar</button>
      </div>
      <div id="shape-label"></div>
    </div>
    <div id="ctrl-bar" class="ctrl-bar">
      <div class="ctrl-bar-r1">
        <button id="aa-btn" class="bar-btn" aria-label="Antialiasing off">Antialias</button>
        <select id="sound-select" class="bar-select">
          <option value="arp">arp</option>
          <option value="bass">bass</option>
          <option value="hat">hat</option>
          <option value="kick1">kick 1</option>
          <option value="kick2">kick 2</option>
          <option value="pad">pad</option>
          <option value="snare">snare</option>
          <option value="master">master</option>
        </select>
        <div class="ctrl-bar-spacer"></div>
        <button id="play-btn" class="play-btn" aria-label="Play"></button>
      </div>
      <div class="ctrl-bar-r2">
        <span class="fps-inline" id="fps-meter">-- fps</span>
      </div>
    </div>
  </div>
  <script>
    if (new URLSearchParams(location.search).has('embedded')) {
      const canvas = document.getElementById('canvas');
      const wrap   = canvas.closest('.canvas-wrap');
      canvas.width  = 540;  canvas.height  = 540;
      canvas.style.width  = '540px'; canvas.style.height = '540px';
      wrap.style.width    = '540px'; wrap.style.height   = '540px';
    }
  </script>
  <script type="module" src="./main.js"></script>
  <script>
(function(){var el=document.getElementById('fps-meter'),f=0,l=performance.now();function t(n){f++;if(n-l>=1000){el.textContent=f+' fps';f=0;l=n;}requestAnimationFrame(t);}requestAnimationFrame(t);})();
  </script>
</body>
</html>
