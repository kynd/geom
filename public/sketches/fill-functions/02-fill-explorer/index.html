<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fill explorer</title>
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.169.0/build/three.module.min.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.169.0/examples/jsm/"
    }
  }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../../../styles/demo-ui.css" />
  <style>
    html, body {
      width: 100%; height: 100%; background: #000;
      display: flex; align-items: center; justify-content: center; overflow: hidden;
    }
    #canvas { display: block; width: 1920px; height: 1080px; }

    #bottom-info {
      position: absolute; bottom: 0; left: 0; right: 0;
      padding: 80px 56px 40px;
      background: linear-gradient(to top, rgba(0,0,0,0.65) 0%, transparent 100%);
      pointer-events: none;
    }
    #info-name {
      font-family: 'Sora', sans-serif; font-size: 11px; font-weight: 400;
      color: rgba(255,255,255,0.92); letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 6px;
      text-shadow: 0 1px 4px rgba(0,0,0,0.9);
    }
    #info-desc {
      font-family: 'Sora', sans-serif; font-size: 11px; font-weight: 300;
      color: rgba(255,255,255,0.60); line-height: 1.65; max-width: 680px;
      text-shadow: 0 1px 4px rgba(0,0,0,0.9);
    }
  </style>
</head>
<body>
  <div class="canvas-wrap">
    <canvas id="canvas" width="1920" height="1080"></canvas>
    <div id="overlay">
      <div id="bottom-info">
        <div id="info-name"></div>
        <div id="info-desc"></div>
      </div>
    </div>
    <div id="ctrl-bar" class="ctrl-bar">
      <div class="ctrl-bar-r1">
        <select id="mode-select" class="bar-select" aria-label="Fill function mode"></select>
        <button id="aa-btn" class="bar-btn" aria-label="Antialiasing off">Antialias</button>
        <div class="ctrl-bar-spacer"></div>
        <button id="play-btn" class="play-btn" aria-label="Pause"></button>
      </div>
      <div class="ctrl-bar-r2">
        <span class="fps-inline" id="fps-meter">-- fps</span>
      </div>
    </div>
  </div>
  <script>
    if (new URLSearchParams(location.search).has('embedded')) {
      const canvas = document.getElementById('canvas');
      const wrap   = canvas.closest('.canvas-wrap');
      canvas.width  = 960;  canvas.height  = 540;
      canvas.style.width  = '960px'; canvas.style.height = '540px';
      wrap.style.width    = '960px'; wrap.style.height   = '540px';
      document.getElementById('bottom-info').style.padding = '44px 32px 24px';
    }
  </script>
  <script type="module" src="./main.js"></script>
  <script>
(function(){var el=document.getElementById('fps-meter'),f=0,l=performance.now();function t(n){f++;if(n-l>=1000){el.textContent=f+' fps';f=0;l=n;}requestAnimationFrame(t);}requestAnimationFrame(t);})();
  </script>
</body>
</html>
