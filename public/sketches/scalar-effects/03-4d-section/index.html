<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>03 — 4D Section</title>
  <script type="importmap">{"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.169.0/build/three.module.min.js"}}</script>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="../../../styles/demo-ui.css" />
  <style>
    html, body { background: #000; width: 100%; height: 100%; overflow: hidden; display: flex; align-items: center; justify-content: center; }
    #canvas { display: block; width: 1920px; height: 1080px; }
    #overlay {
      position: absolute; inset: 0; pointer-events: none;
      display: flex; flex-direction: column; justify-content: flex-end;
    }
    .label {
      padding: 0 56px 52px;
      font-family: 'Sora', sans-serif; font-size: 12px; font-weight: 300;
      color: rgba(255,255,255,0.40); letter-spacing: 0.06em;
    }
    .label strong { font-weight: 400; color: rgba(255,255,255,0.70); }
  </style>
</head>
<body>
  <div class="canvas-wrap">
    <canvas id="canvas" width="1920" height="1080"></canvas>
    <div id="overlay">
      <div class="label">
        <strong>4D Section</strong><br>
        bass/treble rotate 4D gyroid; 3D cross-section changes topology
      </div>
    </div>
    <div id="ctrl-bar" class="ctrl-bar">
      <div class="ctrl-bar-r1">
        <select id="sound-select" class="bar-select">
          <option value="arp">arp</option>
          <option value="bass">bass</option>
          <option value="hat">hat</option>
          <option value="kick1">kick 1</option>
          <option value="kick2">kick 2</option>
          <option value="pad">pad</option>
          <option value="snare">snare</option>
          <option value="master">master</option>
        </select>
        <button id="aa-btn" class="bar-btn" aria-label="Antialiasing off">Antialias</button>
        <div class="ctrl-bar-spacer"></div>
        <button id="play-btn" class="play-btn" aria-label="Play"></button>
      </div>
      <div class="ctrl-bar-r2">
        <span class="fps-inline" id="fps-meter">-- fps</span>
      </div>
    </div>
  </div>
  <script>
    if (new URLSearchParams(location.search).has('embedded')) {
      const canvas = document.getElementById('canvas');
      const wrap   = canvas.closest('.canvas-wrap');
      canvas.width  = 960; canvas.height  = 540;
      canvas.style.width  = '960px'; canvas.style.height = '540px';
      wrap.style.width    = '960px'; wrap.style.height   = '540px';
    }
  </script>
  <script type="module" src="./main.js"></script>
  <script>
(function(){var el=document.getElementById('fps-meter'),f=0,l=performance.now();function t(n){f++;if(n-l>=1000){el.textContent=f+' fps';f=0;l=n;}requestAnimationFrame(t);}requestAnimationFrame(t);})();
  </script>
</body>
</html>
