<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sound Tube</title>
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.169.0/build/three.module.min.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.169.0/examples/jsm/"
    }
  }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400&family=Google+Sans+Code:wght@400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../../../styles/demo-ui.css" />
  <style>
    html, body { width: 100%; height: 100%; background: #000; display: flex; align-items: center; justify-content: center; overflow: hidden; }
    #canvas { display: block; width: 1920px; height: 1080px; cursor: grab; }

    /* Shape / Lighting toggle buttons */
    .shape-btn, .light-btn {
      height: 28px; padding: 0 13px; border-radius: 14px;
      background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.14);
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      font-family: 'Sora', sans-serif; font-size: 10px; font-weight: 300;
      color: rgba(255,255,255,0.30); transition: all 0.15s; white-space: nowrap;
    }
    .shape-btn.active, .light-btn.active {
      background: rgba(255,255,255,0.16); border-color: rgba(255,255,255,0.34);
      color: rgba(255,255,255,0.90);
    }
    .shape-btn:hover:not(.active), .light-btn:hover:not(.active) {
      background: rgba(255,255,255,0.12); color: rgba(255,255,255,0.55);
    }

    /* ── Bottom-right sliders ─────────────────────────────────────────── */
    #param-controls {
      position: absolute; bottom: 130px; right: 32px;
      display: flex; flex-direction: column; gap: 10px; pointer-events: all;
    }
    .param-sep { height: 1px; background: rgba(255,255,255,0.10); margin: 4px 0; }

    #bloom-controls {
      position: absolute; bottom: 32px; right: 32px;
      display: flex; flex-direction: column; gap: 10px; pointer-events: all;
    }

    .bloom-row { display: flex; align-items: center; gap: 10px; transition: opacity 0.2s; }
    .bloom-label { font-family: 'Sora', sans-serif; font-size: 10px; font-weight: 300; color: rgba(255,255,255,0.38); letter-spacing: 0.06em; text-transform: uppercase; width: 68px; text-align: right; }
    .bloom-val { font-family: 'Google Sans Code', monospace; font-size: 10px; color: rgba(255,255,255,0.38); width: 28px; }

    input[type=range] { -webkit-appearance: none; appearance: none; width: 130px; height: 2px; background: rgba(255,255,255,0.18); border-radius: 1px; outline: none; cursor: pointer; }
    input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 12px; height: 12px; border-radius: 50%; background: rgba(255,255,255,0.80); cursor: pointer; }
    input[type=range]::-moz-range-thumb { width: 12px; height: 12px; border-radius: 50%; background: rgba(255,255,255,0.80); cursor: pointer; border: none; }
  </style>
</head>
<body>
  <div class="canvas-wrap">
    <canvas id="canvas" width="1920" height="1080"></canvas>
    <div id="overlay">

      <!-- Shape + bump controls (above bloom) -->
      <div id="param-controls">
        <div class="bloom-row">
          <span class="bloom-label">Radius</span>
          <input type="range" id="radius-slider" min="0.05" max="5" step="0.05" value="0.55">
          <span class="bloom-val" id="radius-val">0.55</span>
        </div>
        <div class="bloom-row" id="height-row">
          <span class="bloom-label">Height</span>
          <input type="range" id="height-slider" min="0.2" max="3" step="0.05" value="1.2">
          <span class="bloom-val" id="height-val">1.20</span>
        </div>
        <div class="bloom-row">
          <span class="bloom-label">Bump</span>
          <input type="range" id="bump-slider" min="0" max="1" step="0.01" value="0.22">
          <span class="bloom-val" id="bump-val">0.22</span>
        </div>
        <div class="param-sep"></div>
      </div>

      <div id="bloom-controls">
        <div class="bloom-row">
          <span class="bloom-label">Strength</span>
          <input type="range" id="bloom-strength" min="0" max="3" step="0.05" value="1.2">
          <span class="bloom-val" id="bloom-strength-val">1.20</span>
        </div>
        <div class="bloom-row">
          <span class="bloom-label">Threshold</span>
          <input type="range" id="bloom-threshold" min="0" max="1" step="0.01" value="0">
          <span class="bloom-val" id="bloom-threshold-val">0.00</span>
        </div>
      </div>

    </div>
    <div id="ctrl-bar" class="ctrl-bar">
      <div class="ctrl-bar-r1">
        <button id="aa-btn" class="bar-btn" aria-label="Antialiasing off">Antialias</button>
        <select id="sound-select" class="bar-select">
          <option value="arp">arp</option>
          <option value="bass">bass</option>
          <option value="hat">hat</option>
          <option value="kick1">kick 1</option>
          <option value="kick2">kick 2</option>
          <option value="pad">pad</option>
          <option value="snare">snare</option>
          <option value="master">master</option>
        </select>
        <div class="bar-sep"></div>
        <button class="shape-btn active" data-shape="0">Tube</button>
        <button class="shape-btn" data-shape="1">Sphere</button>
        <button class="shape-btn" data-shape="2">Cone</button>
        <div class="bar-sep"></div>
        <button class="light-btn active" data-light="0">Flash</button>
        <button class="light-btn" data-light="1">Rim</button>
        <button class="light-btn" data-light="2">Hue</button>
        <div class="ctrl-bar-spacer"></div>
        <button id="play-btn" class="play-btn" aria-label="Play"></button>
      </div>
      <div class="ctrl-bar-r2">
        <span class="fps-inline" id="fps-meter">-- fps</span>
      </div>
    </div>
  </div>
  <script>
    if (new URLSearchParams(location.search).has('embedded')) {
      const canvas = document.getElementById('canvas');
      const wrap   = canvas.closest('.canvas-wrap');
      canvas.width  = 960;  canvas.height  = 540;
      canvas.style.width  = '960px'; canvas.style.height = '540px';
      wrap.style.width    = '960px'; wrap.style.height   = '540px';
    }
  </script>
  <script type="module" src="./main.js"></script>
  <script>
(function(){var el=document.getElementById('fps-meter'),f=0,l=performance.now();function t(n){f++;if(n-l>=1000){el.textContent=f+' fps';f=0;l=n;}requestAnimationFrame(t);}requestAnimationFrame(t);})();
  </script>
</body>
</html>
