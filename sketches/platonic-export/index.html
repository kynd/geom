<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Platonic Export</title>
  <script type="importmap">{"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.169.0/build/three.module.min.js"}}</script>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400&family=Google+Sans+Code:wght@400&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%; height: 100%; background: #111;
      display: flex; align-items: center; justify-content: center; overflow: hidden;
    }
    /* Display at largest square that fits the viewport; canvas buffer stays 1280×1280 */
    .canvas-wrap {
      position: relative;
      width: min(100vw, 100vh);
      height: min(100vw, 100vh);
    }
    #canvas { display: block; width: 100%; height: 100%; }

    #play-btn {
      position: absolute; top: 2.5%; right: 2.5%;
      width: 40px; height: 40px; border-radius: 50%;
      background: rgba(255,255,255,0.10); border: 1px solid rgba(255,255,255,0.20);
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      color: #fff; transition: background 0.15s;
    }
    #play-btn:hover { background: rgba(255,255,255,0.22); }

    #record-btn {
      position: absolute; top: 2.5%; left: 2.5%;
      height: 40px; padding: 0 16px; border-radius: 20px;
      background: rgba(255,255,255,0.10); border: 1px solid rgba(255,255,255,0.20);
      cursor: pointer; display: flex; align-items: center; gap: 8px;
      font-family: 'Sora', sans-serif; font-size: 11px; font-weight: 300;
      letter-spacing: 0.06em; color: rgba(255,255,255,0.60);
      transition: background 0.15s; white-space: nowrap;
    }
    #record-btn:hover:not(:disabled) { background: rgba(255,255,255,0.18); }
    #record-btn:disabled { opacity: 0.45; cursor: not-allowed; }

    .rec-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: #ff5555; flex-shrink: 0;
    }

    #rec-label {
      position: absolute; top: calc(2.5% + 48px); left: 2.5%;
      font-family: 'Google Sans Code', monospace; font-size: 11px;
      color: rgba(255,255,255,0.35); pointer-events: none;
    }
  </style>
</head>
<body>
  <div class="canvas-wrap">
    <canvas id="canvas" width="1280" height="1280"></canvas>
    <button id="record-btn" aria-label="Record">
      <span class="rec-dot"></span><span id="rec-text">Record</span>
    </button>
    <span id="rec-label"></span>
    <button id="play-btn" aria-label="Pause"></button>
  </div>
  <script type="module" src="./main.js"></script>
</body>
</html>
